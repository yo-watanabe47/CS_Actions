# GitHub Actionsの画面上に表示されるワークフローの名前
name: .NET CS_WebApp CD

# ワークフローが実行される条件（トリガー）の定義
# 【修正後】CIワークフローが「完了」した時に実行
on:
  workflow_run:
    workflows: [".NET CS_WebApp CI"] # ※ci.ymlの「name:」で指定している名前と完全に一致させる必要がある
    types:
      - completed
    branches:
      - main

# 実行するジョブ（作業のまとまり）の定義
jobs:
  deploy: # ジョブの識別名（任意の名前）
    # GitHub側が用意する使い捨ての仮想環境(Runner)のOSを指定
    runs-on: ubuntu-latest
    
    # ジョブ内で順番に実行される手順（ステップ）のリスト
    steps:
      - name: 運用環境へのSSH疎通確認
        # サードパーティ製（コミュニティ作成）のSSH接続アクションを利用
        uses: appleboy/ssh-action@v1.0.3
        
        # 上記のアクションに渡すパラメータ（引数）の定義
        with:
          # GitHub Secretsから認証情報を安全に取得し、環境に展開（注入）する
          host: ${{ secrets.ACTIONS_AZURE_HOST }}         # 接続先サーバーのIPアドレス
          username: ${{ secrets.ACTIONS_AZURE_USER }}     # ログインユーザー名（ubuntu）
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}      # 秘密鍵（PEM）のテキストデータ
          
          # SSH接続が成功した後に、リモートサーバー上で実行されるシェルコマンド
          # （「|」は複数行の文字列を記述するためのYAMLの記法）
          script: |
            echo "=== SSH Connection Successful ==="
            echo "--- System Information ---"
            uname -a # サーバーのOSやカーネル情報を出力し、Linuxであることを確認
            echo "--- Current User ---"
            whoami   # 実行ユーザーを出力し、指定したユーザーでログインできたか確認

      - name: ASP.NET Core Runtime 10.0 のプロビジョニング
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          script: |
            # 1. パッケージリストの最新化
            echo "--- Updating Package List ---"
            sudo apt-get update
            # 2. ASP.NET Core ランタイムのインストール
            echo "--- Installing ASP.NET Core Runtime 10.0 ---"
            sudo apt-get install -y aspnetcore-runtime-10.0
            # 3. インストール結果の確認
            echo "--- Verifying Installation ---"
            dotnet --list-runtimes

      # --- アーティファクトの生成（ビルド） ---
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: .NET SDK のセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: アプリケーションのビルドと発行 (Publish)
        # FDD形式、Linux向けに最適化して ./publish フォルダに出力
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained false -o ./publish
          # 追加 リポジトリ内のsql/init.sqlをpublishディレクトリにコピーする
          cp SQL/init.sql ./publish/

      # --- 運用環境の事前準備（ディレクトリ作成とクリーンアップ） ---
      - name: デプロイ先ディレクトリの準備
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          script: |
            echo "--- Preparing Deployment Directory ---"
            # 配置用ディレクトリの作成
            sudo mkdir -p /var/www/myapp
            # azureuserユーザーに所有権を変更（SCPでの書き込み許可のため）
            sudo chown -R $(whoami):$(whoami) /var/www/myapp
            # 前回デプロイ時の古いファイルを削除（冪等性の担保）
            rm -rf /var/www/myapp/*

      # --- アーティファクトの転送 ---
      - name: SCPによるアーティファクトの転送
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          source: "./publish/*"       # 送信元（Runner上で生成した全ファイル）
          target: "/var/www/myapp/"   # 送信先（VM上の配置ディレクトリ）
          strip_components: 1         # 転送先に「publish」という親フォルダを作らず中身だけを展開

          # --- データベースの初期化（SQLの自動実行） ---
      - name: データベースの初期化（init.sql の実行）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}  
          username: ${{ secrets.ACTIONS_AZURE_USER }} 
          key: ${{ secrets.ACTIONS_AZURE_SECRET }} 
          script: |
            echo "--- Executing init.sql against Remote Database ---"     
            # 既にVMにインストール済みのpsqlを利用し、リモートDBへSQLを適用
            # （/var/www/myapp/ に転送された init.sql を使用します）
            PGPASSWORD="${{ secrets.AZURE_DB_PASSWORD }}" psql -h ${{ secrets.AZURE_DB_HOST }} -U ${{ secrets.AZURE_DB_USER }} -d postgres -f /var/www/myapp/init.sql
            echo "--- Verifying Data Insertion ---"
            # 作成された ActionsDB に接続し、productテーブルの件数を確認する
            PGPASSWORD="${{ secrets.AZURE_DB_PASSWORD }}" psql -h ${{ secrets.AZURE_DB_HOST }} -U ${{ secrets.AZURE_DB_USER }} -d ActionsDB -c "SELECT COUNT(*) AS product_total_count FROM product;"
            echo "--- Database Initialization Completed ---"

          # --- Webサーバーの連携とアプリケーションの起動 ---
      - name: リバースプロキシ構成とサービスの起動
        uses: appleboy/ssh-action@master
        with:
          # 運用環境（VM）へのSSH接続情報
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          script: |
            echo "--- Configuring systemd service ---"      
            
            # 【1. systemd サービス定義ファイルの生成】
            # アプリをバックグラウンドで常時稼働させるための設定ファイル(myapp.service)を動的に作成
            # ヒアドキュメント(cat << EOF > ...)を使って、設定内容を直接ファイルに書き込み
            sudo bash -c 'cat << EOF > /etc/systemd/system/myapp.service
            [Unit]
              # プロセスの説明（systemctl status 等で表示）
              Description=C# ASP.NET Core Application           
            [Service]
              # アプリケーションの実行ベースとなるディレクトリ
              WorkingDirectory=/var/www/myapp
              # アプリケーションの起動コマンド(Kestrelサーバーをlocalhostの5000番ポートで起動)
              ExecStart=/usr/bin/dotnet /var/www/myapp/CS_Actions_WebApp.dll --urls "http://localhost:5000"
              # アプリが異常終了した場合、常に自動再起動する設定
              Restart=always
              # 再起動するまでの待機時間（秒）
              RestartSec=10 
              # ログ(syslog)出力時の識別子名
              SyslogIdentifier=dotnet-myapp
              # セキュリティの観点から、rootではなく一般ユーザー(ubuntu等)権限で実行
              User=${{ secrets.ACTIONS_AZURE_USER }}      
              # .NETの動作環境をProduction(運用環境)に設定
              Environment=ASPNETCORE_ENVIRONMENT=Production
              # 【重要】GitHub Secretsから接続文字列を組み立てて環境変数として注入
              # ソースコードや設定ファイルにパスワードを直接書かない（ハードコードしない）ためのベストプラクティス
              Environment="ConnectionStrings__DefaultConnection=Host=${{ secrets.AZURE_DB_HOST }};Database=ActionsDB;Username=${{ secrets.AZURE_DB_USER }};Password=${{ secrets.AZURE_DB_PASSWORD }}"      
            [Install]
              # OS起動時に自動起動するためのターゲット指定(通常のマルチユーザーモード時)
              WantedBy=multi-user.target
            EOF'
            echo "--- Configuring Nginx ---"
                  
            # 【2. Nginx リバースプロキシ設定の生成】
            echo "--- Installing Nginx ---"
            # Nginxがインストールされていない場合を考慮し、インストールを実行
            sudo apt-get update
            sudo apt-get install -y nginx
            echo "--- Configuring Nginx ---"
            # インターネットからのアクセス(80番ポート)を受け止め、内部の5000番ポートへ転送(プロキシ)する設定
            sudo bash -c 'cat << EOF > /etc/nginx/sites-available/default
            server {
              # HTTPアクセス(80番ポート)を待ち受ける
              listen 80;
                
              # 全てのホスト名(ドメイン)リクエストを受け付ける
              server_name _;
                      
              location / {
                # 内部で動いている.NETアプリ(5000番ポート)へリクエストを転送
                proxy_pass http://localhost:5000;      
                # HTTP/1.1を使用
                proxy_http_version 1.1;
                # WebSocket通信などをサポートするためのヘッダー群
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection keep-alive;              
                # 元のクライアントのホスト名やIP情報を、背後の.NETアプリへ正しく伝えるための設定
                proxy_set_header Host \$host;
                proxy_cache_bypass \$http_upgrade;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }
            }
            EOF'
            echo "--- Reloading Daemons and Restarting Services ---"
             
            # 【3. 設定の反映とサービスの起動】
            # systemdの定義ファイルを新規作成・変更したため、システムに再読み込みさせる
            sudo systemctl daemon-reload
            # OS再起動時にもアプリが自動起動するように有効化
            sudo systemctl enable myapp.service
            # アプリケーションサービスを起動(または再起動して最新化)
            sudo systemctl restart myapp.service
            # Nginxを再起動し、作成したリバースプロキシ設定を反映させる
            sudo systemctl restart nginx
            echo "--- Deployment Completed Successfully! ---"