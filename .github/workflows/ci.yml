name: .NET CS_WebApp CI

on: 
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: .NET SDKのセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ----- ここから追記 -----
      - name: コードフォーマットの検証 (Lint)
        run: dotnet format --verify-no-changes
      # ----- ここまで追記 -----

      - name: プロジェクトのビルド
        run: dotnet build --configuration Release
      
      - name: 単体・結合テストの実行
      # ビルド済みのバイナリを再利用(--no-build)してテストを実行
      # verbosity=detailedを付けることで、Console.WriteLineの出力がGitHub Actionsのログに表示される
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=detailed"